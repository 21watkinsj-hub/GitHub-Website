<!DOCTYPE html>
<html lang="en">
<head>
<title>Centered heading</title>
<meta charset="utf-8">
<style>
	body { margin: 0; }
	header { display: grid; min-height: 100vh;
			 
			 background-color: #227093; 
			 background-image: url( images/lake.jpg);
			 background-size: 100% 100%;
			 background-repeat: no-repeat; }
	h1 { margin: auto; color: #FFFFFF; font-family: Arial, sans-serif; }
	flex-wrap: wrap; <-- /* allows multiple centered flex items */ -->
</style>
</head>
<body>
<header>
	<h1> Centered Heading</h1>
</header>
<main>
	Hi welcome to my page
</main>
</body>
</html>
